<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@600;700&amp;family=IBM+Plex+Sans:wght@400;500;600&amp;family=IBM+Plex+Mono:wght@500&amp;display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');
        
        .font-display { font-family: 'Roboto Slab', serif; }
        .font-body { font-family: 'IBM Plex Sans', sans-serif; }
        .font-mono { font-family: 'IBM Plex Mono', monospace; }

        .stripe-border {
            background-image: repeating-linear-gradient(135deg, #1d4ed8 0px, #1d4ed8 14px, #fafaf9 14px, #fafaf9 20px, #b91c1c 20px, #b91c1c 34px, #fafaf9 34px, #fafaf9 40px);
        }

        textarea {
            resize: none;
        }
    </style>
</head>
<body class="min-h-screen w-full flex items-center justify-center p-4 sm:p-8 bg-stone-200">
    <div class="w-full max-w-4xl">
        <!-- Header -->
        <div class="mb-6 flex items-center gap-3">
            <div class="w-11 h-11 rounded-full border-2 border-dashed border-blue-700 text-blue-700 flex items-center justify-center shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9.5 3.447-4.5m-6.088 4.5L7.5 15" />
                </svg>
            </div>
            <div>
                <h1 class="font-display text-2xl sm:text-3xl font-bold text-slate-900 leading-tight">Translate</h1>
                <p class="font-mono text-xs tracking-widest uppercase text-slate-500">par avion · delivered instantly</p>
            </div>
        </div>

        <!-- Striped frame -->
        <div class="stripe-border p-[7px] rounded-[12px]">
            <div class="rounded-lg p-5 sm:p-7 bg-stone-50">
                <!-- Language row -->
                <div class="flex items-center gap-3 mb-5">
                    <select id="sourceLang" class="flex-1 min-w-0 font-mono text-sm border border-stone-300 rounded-sm px-3 py-2.5 bg-white text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-700 focus:border-blue-700">
                        <option value="auto">Auto-detect</option>
                    </select>

                    <button id="swapBtn" title="Swap languages" class="shrink-0 w-10 h-10 rounded-full border-2 border-dashed border-slate-400 text-slate-600 flex items-center justify-center hover:border-blue-700 hover:text-blue-700 transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                        </svg>
                    </button>

                    <select id="targetLang" class="flex-1 min-w-0 font-mono text-sm border border-stone-300 rounded-sm px-3 py-2.5 bg-white text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-700 focus:border-blue-700">
                    </select>
                </div>

                <!-- Two panes -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 relative">
                    <div class="hidden md:block absolute left-1/2 top-0 bottom-0 border-l border-dashed border-stone-300" aria-hidden="true"></div>

                    <!-- Source -->
                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <span class="font-mono text-xs uppercase tracking-widest text-blue-700">Source</span>
                            <span id="sourceCharCount" class="font-mono text-xs text-slate-400">0 chars</span>
                        </div>
                        <textarea id="sourceText" rows="8" placeholder="Type or paste text to translate..." 
                            class="w-full h-48 md:h-56 font-body text-base border border-stone-300 rounded-sm p-3 bg-white text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-700 focus:border-blue-700"></textarea>
                    </div>

                    <!-- Target -->
                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <span class="font-mono text-xs uppercase tracking-widest text-red-700" id="targetLabel">Target</span>
                            <div class="flex items-center gap-1.5">
                                <button id="speakBtn" title="Listen" class="p-1.5 rounded-sm text-slate-500 hover:text-blue-700 hover:bg-stone-100 transition-colors disabled:opacity-30">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m-.5-15a3.5 3.5 0 10-7 0" />
                                    </svg>
                                </button>
                                <button id="copyBtn" title="Copy" class="p-1.5 rounded-sm text-slate-500 hover:text-blue-700 hover:bg-stone-100 transition-colors disabled:opacity-30">
                                    <svg id="copyIcon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16v-4m4 4v4m4-8v8m4-4v-4m-16 4h16" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div id="translatedText" class="w-full h-48 md:h-56 font-body text-base border border-stone-300 rounded-sm p-3 bg-stone-100 overflow-y-auto whitespace-pre-wrap min-h-[200px] text-slate-800"></div>
                    </div>
                </div>

                <!-- Action -->
                <div class="mt-6 flex flex-col items-center gap-2">
                    <button id="translateBtn" 
                        class="font-mono text-sm uppercase tracking-wide px-7 py-2.5 rounded-sm text-white bg-blue-700 hover:bg-blue-800 flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
                        <span id="btnText">Translate</span>
                    </button>
                    <p class="font-mono text-xs text-slate-400">⌘ / Ctrl + Enter to send</p>
                </div>
            </div>
        </div>

        <p class="text-center font-mono text-xs text-slate-400 mt-4">Translations powered by Claude</p>
    </div>

    <script>
        const LANGUAGES = [
            { name: "English", code: "en", speech: "en-US" },
            { name: "Spanish", code: "es", speech: "es-ES" },
            { name: "French", code: "fr", speech: "fr-FR" },
            { name: "German", code: "de", speech: "de-DE" },
            { name: "Italian", code: "it", speech: "it-IT" },
            { name: "Portuguese", code: "pt", speech: "pt-PT" },
            { name: "Russian", code: "ru", speech: "ru-RU" },
            { name: "Chinese (Simplified)", code: "zh", speech: "zh-CN" },
            { name: "Japanese", code: "ja", speech: "ja-JP" },
            { name: "Korean", code: "ko", speech: "ko-KR" },
            { name: "Arabic", code: "ar", speech: "ar-SA" },
            { name: "Hindi", code: "hi", speech: "hi-IN" },
            { name: "Bengali", code: "bn", speech: "bn-IN" },
            { name: "Telugu", code: "te", speech: "te-IN" },
            { name: "Tamil", code: "ta", speech: "ta-IN" },
            { name: "Marathi", code: "mr", speech: "mr-IN" },
            { name: "Urdu", code: "ur", speech: "ur-IN" },
            { name: "Gujarati", code: "gu", speech: "gu-IN" },
            { name: "Kannada", code: "kn", speech: "kn-IN" },
            { name: "Malayalam", code: "ml", speech: "ml-IN" },
            { name: "Punjabi", code: "pa", speech: "pa-IN" },
            { name: "Dutch", code: "nl", speech: "nl-NL" },
            { name: "Turkish", code: "tr", speech: "tr-TR" },
            { name: "Vietnamese", code: "vi", speech: "vi-VN" },
            { name: "Thai", code: "th", speech: "th-TH" },
            { name: "Indonesian", code: "id", speech: "id-ID" },
            { name: "Polish", code: "pl", speech: "pl-PL" },
            { name: "Swedish", code: "sv", speech: "sv-SE" },
            { name: "Greek", code: "el", speech: "el-GR" },
            { name: "Hebrew", code: "he", speech: "he-IL" },
        ];

        let sourceLang = "en";
        let targetLang = "hi";
        let sourceText = "";
        let translatedText = "";
        let detectedLanguage = "";
        let isLoading = false;
        let copied = false;
        let isSpeaking = false;

        const sourceLangSelect = document.getElementById('sourceLang');
        const targetLangSelect = document.getElementById('targetLang');
        const sourceTextArea = document.getElementById('sourceText');
        const translatedDiv = document.getElementById('translatedText');
        const translateBtn = document.getElementById('translateBtn');
        const swapBtn = document.getElementById('swapBtn');
        const copyBtn = document.getElementById('copyBtn');
        const speakBtn = document.getElementById('speakBtn');
        const sourceCharCount = document.getElementById('sourceCharCount');
        const targetLabel = document.getElementById('targetLabel');
        const btnText = document.getElementById('btnText');

        // Populate languages
        function populateLanguages() {
            // Source
            LANGUAGES.forEach(lang => {
                const option = document.createElement('option');
                option.value = lang.code;
                option.textContent = lang.name;
                sourceLangSelect.appendChild(option);
            });
            
            // Target
            LANGUAGES.forEach(lang => {
                const option = document.createElement('option');
                option.value = lang.code;
                option.textContent = lang.name;
                targetLangSelect.appendChild(option);
            });
            
            sourceLangSelect.value = sourceLang;
            targetLangSelect.value = targetLang;
        }

        function nameFor(code) {
            return LANGUAGES.find(l => l.code === code)?.name || code;
        }

        function speechFor(code) {
            return LANGUAGES.find(l => l.code === code)?.speech || "en-US";
        }

        async function translateText() {
            const currentSourceText = sourceTextArea.value.trim();
            if (!currentSourceText || isLoading) return;

            isLoading = true;
            updateUI();

            try {
                const sourceDescription = sourceLang === "auto" ? "an unspecified language (detect it)" : nameFor(sourceLang);
                const targetDescription = nameFor(targetLang);

                const prompt = `Translate the text between the triple quotes from ${sourceDescription} into ${targetDescription}. Preserve tone and meaning; do not add explanations.

Text:
"""${currentSourceText}"""

Respond with ONLY valid JSON, no markdown fences, no commentary, in exactly this shape:
{"translation": "<translated text>", "detectedLanguage": "<name of the detected source language, or empty string if source language was already specified>"}`;

                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        // Note: Anthropic requires x-api-key header in real use
                    },
                    body: JSON.stringify({
                        model: "claude-sonnet-4-6",
                        max_tokens: 1000,
                        messages: [{ role: "user", content: prompt }],
                    }),
                });

                if (!response.ok) throw new Error("Request failed");

                const data = await response.json();
                const textBlock = data.content?.find(b => b.type === "text");
                if (!textBlock) throw new Error("No response");

                let raw = textBlock.text.trim();
                raw = raw.replace(/^```(json)?\s*/i, "").replace(/```\s*$/i, "").trim();

                let parsed;
                try {
                    parsed = JSON.parse(raw);
                } catch {
                    parsed = { translation: raw, detectedLanguage: "" };
                }

                translatedText = parsed.translation || "";
                detectedLanguage = parsed.detectedLanguage || "";
            } catch (err) {
                translatedText = "Couldn't reach the translator. Please try again.";
            } finally {
                isLoading = false;
                updateUI();
            }
        }

        function updateUI() {
            sourceCharCount.textContent = `${sourceTextArea.value.length} chars`;
            
            if (isLoading) {
                translateBtn.disabled = true;
                btnText.innerHTML = `<span class="inline-flex items-center"><span class="animate-spin mr-2">⟳</span>Translating</span>`;
                translatedDiv.innerHTML = `<span class="flex items-center gap-2 text-slate-400"><span class="animate-spin">⟳</span> Translating...</span>`;
            } else {
                translateBtn.disabled = !sourceTextArea.value.trim();
                btnText.textContent = "Translate";
                
                if (translatedText) {
                    translatedDiv.textContent = translatedText;
                    targetLabel.innerHTML = `Target${detectedLanguage ? ` <span class="text-slate-400 normal-case tracking-normal">· detected ${detectedLanguage}</span>` : ''}`;
                } else {
                    translatedDiv.innerHTML = `<span class="text-slate-400">Translation appears here</span>`;
                }
            }
        }

        function handleSwap() {
            if (sourceLang === "auto") return;
            const temp = sourceLang;
            sourceLang = targetLang;
            targetLang = temp;
            
            sourceLangSelect.value = sourceLang;
            targetLangSelect.value = targetLang;
            
            const tempText = sourceTextArea.value;
            sourceTextArea.value = translatedText;
            translatedText = tempText;
            
            detectedLanguage = "";
            updateUI();
        }

        async function handleCopy() {
            if (!translatedText) return;
            try {
                await navigator.clipboard.writeText(translatedText);
                const original = copyBtn.innerHTML;
                copyBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-blue-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>`;
                setTimeout(() => {
                    copyBtn.innerHTML = original;
                }, 1800);
            } catch (e) {}
        }

        function handleSpeak() {
            if (!translatedText || !('speechSynthesis' in window)) return;
            
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(translatedText);
            utter.lang = speechFor(targetLang);
            
            utter.onstart = () => { isSpeaking = true; speakBtn.style.opacity = 0.6; };
            utter.onend = () => { isSpeaking = false; speakBtn.style.opacity = 1; };
            utter.onerror = () => { isSpeaking = false; speakBtn.style.opacity = 1; };
            
            window.speechSynthesis.speak(utter);
        }

        // Event listeners
        function setupListeners() {
            sourceLangSelect.addEventListener('change', (e) => {
                sourceLang = e.target.value;
            });
            
            targetLangSelect.addEventListener('change', (e) => {
                targetLang = e.target.value;
            });
            
            sourceTextArea.addEventListener('input', () => {
                updateUI();
            });
            
            sourceTextArea.addEventListener('keydown', (e) => {
                if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
                    e.preventDefault();
                    translateText();
                }
            });
            
            swapBtn.addEventListener('click', handleSwap);
            copyBtn.addEventListener('click', handleCopy);
            speakBtn.addEventListener('click', handleSpeak);
            translateBtn.addEventListener('click', translateText);
            
            // Initial update
            updateUI();
        }

        // Initialize
        window.onload = function() {
            populateLanguages();
            setupListeners();
        };
    </script>
</body>
</html>
