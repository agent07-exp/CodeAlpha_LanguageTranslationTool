<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Translator</title>
<style>
body{font-family:Arial,sans-serif;background:#eee;margin:0;padding:30px}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:10px}
textarea{width:100%;height:180px}
.row{display:flex;gap:10px;margin:10px 0}
select,button{padding:8px}
#out{border:1px solid #ccc;min-height:180px;padding:10px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="container">
<h2>Translator</h2>
<div class="row">
<select id="from"><option value="en">English</option><option value="hi">Hindi</option><option value="es">Spanish</option></select>
<select id="to"><option value="hi">Hindi</option><option value="en">English</option><option value="es">Spanish</option></select>
</div>
<textarea id="src" placeholder="Type text..."></textarea>
<div class="row">
<button onclick="translateText()">Translate</button>
<button onclick="navigator.clipboard.writeText(document.getElementById('out').innerText)">Copy</button>
<button onclick="speak()">Speak</button>
</div>
<div id="out">Translation appears here.</div>
</div>
<script>
const API_KEY="YOUR_AZURE_TRANSLATOR_KEY";
const REGION="YOUR_AZURE_REGION";

async function translateText(){
 if(API_KEY==="YOUR_AZURE_TRANSLATOR_KEY"){
   alert("Enter your Azure Translator API key and region first.");
   return;
 }
 const from=document.getElementById("from").value;
 const to=document.getElementById("to").value;
 const text=document.getElementById("src").value;
 const res=await fetch("https://api.cognitive.microsofttranslator.com/translate?api-version=3.0&from="+from+"&to="+to,{
   method:"POST",
   headers:{
    "Ocp-Apim-Subscription-Key":API_KEY,
    "Ocp-Apim-Subscription-Region":REGION,
    "Content-Type":"application/json"
   },
   body:JSON.stringify([{Text:text}])
 });
 const data=await res.json();
 document.getElementById("out").innerText=data[0].translations[0].text;
}
function speak(){
 let u=new SpeechSynthesisUtterance(document.getElementById("out").innerText);
 speechSynthesis.speak(u);
}
</script>
</body>
</html>
